<h2>Create / Edit Course</h2>
<form [formGroup]="courseForm" (ngSubmit)="onSubmit()">
  <div class="app-plate">
    <div class="course">
      <h3>Main Info</h3>

      <div class="form__control">
        <label for="title">Title</label>
        <input type="text" id="title" formControlName="title" placeholder="Input text" />
        <span *ngIf="title?.invalid && (title?.touched || title?.dirty)" class="text-danger">
          Title is required (min 2 characters).
        </span>
      </div>

      <div class="form__control">
        <label for="description">Description</label>
        <textarea id="description" formControlName="description" placeholder="Input text" rows="4" cols="5"></textarea>
        <span *ngIf="description?.invalid && (description?.touched || description?.dirty)" class="text-danger">
          Description is required (min 2 characters).
        </span>
      </div>

      <div class="separator"></div>
      <h3>Duration</h3>
      <div class="form__control">
        <div class="course__flex">
          <input type="number" id="duration" formControlName="duration" placeholder="Input duration" />
          <div class="course__duration">{{ duration?.value | duration }}</div>
        </div>
        <span *ngIf="duration?.invalid && (duration?.touched || duration?.dirty)" class="text-danger">
          Duration must be 0 or more.
        </span>
      </div>

      <div class="separator"></div>

      <h3>Authors</h3>
      <div class="form__control">
        <div class="course__flex">
          <input type="text" id="author" formControlName="author" placeholder="Input Author Name" />
          <app-button id="createAuthor" [buttonText]="'Create Author'" (click)="addAuthor()"></app-button>
        </div>
        <span *ngIf="author?.invalid && (author?.touched || author?.dirty)" class="text-danger">
          New author should contain only latin letters and numbers (min 2 characters).
        </span>

        <div class="course__authors">
          <div *ngFor="let auth of authors.controls; let i = index" class="course__authors-item">
            <input [value]="auth.value" disabled />
            <fa-icon icon="trash" class="course__icon" (click)="removeAuthor(i)"></fa-icon>
          </div>
        </div>
      </div>

    </div>
  </div>

</form>

<div class="form__action">
  <app-button [buttonText]="'Cancel'" type="submit"></app-button>
  <app-button [buttonText]="'Create Course'" type="submit"></app-button>
</div>
