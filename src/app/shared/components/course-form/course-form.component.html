<form [formGroup]="courseForm" (ngSubmit)="onSubmit()" class="course-form">
  <!-- Título -->
  <div class="form-group">
    <label for="title">Title</label>
    <input id="title" formControlName="title" type="text" class="form-control"
      [class.invalid]="title?.invalid && (title?.dirty || title?.touched)" />
    <div *ngIf="title?.invalid && (title?.dirty || title?.touched)" class="error">
      <small *ngIf="title?.errors?.['required']">Title is required.</small>
      <small *ngIf="title?.errors?.['minlength']">Title must be at least 2 characters long.</small>
    </div>
  </div>

  <!-- Descripción -->
  <div class="form-group">
    <label for="description">Description</label>
    <textarea id="description" formControlName="description" class="form-control"
      [class.invalid]="description?.invalid && (description?.dirty || description?.touched)"></textarea>
    <div *ngIf="description?.invalid && (description?.dirty || description?.touched)" class="error">
      <small *ngIf="description?.errors?.['required']">Description is required.</small>
      <small *ngIf="description?.errors?.['minlength']">Description must be at least 2 characters long.</small>
    </div>
  </div>

  <!-- Duración -->
  <div class="form-group">
    <label for="duration">Duration (minutes)</label>
    <input id="duration" formControlName="duration" type="number" class="form-control"
      [class.invalid]="duration?.invalid && (duration?.dirty || duration?.touched)" />
    <div *ngIf="duration?.invalid && (duration?.dirty || duration?.touched)" class="error">
      <small *ngIf="duration?.errors?.['required']">Duration is required.</small>
      <small *ngIf="duration?.errors?.['min']">Duration must be positive.</small>
    </div>
  </div>

  <!-- Selector de autores disponibles -->
  <div class="form-group">
    <label for="author">Add Author</label>
    <div class="input-group">
      <select id="author" formControlName="author" class="form-control">
        <option value="">-- Select an author --</option>
        <option *ngFor="let author of availableAuthors" [value]="author.id">
          {{ author.name }}
        </option>
      </select>
      <app-button type="button" buttonText="Add" (click)="addAuthor()" 
        [disabled]="!author?.value"></app-button>
    </div>
  </div>

  <!-- Lista de autores agregados -->
  <div class="form-group">
    <label>Selected Authors</label>
    <ul>
      <li *ngFor="let authorId of authors.controls; let i = index">
        {{ getAuthorNameById(authorId.value) }}
        <app-button type="button" buttonText="Remove" (click)="removeAuthor(i)"></app-button>
      </li>
    </ul>
  </div>

  <!-- Botones de acción -->
  <div class="form_actions">
    <app-button type="submit" [disabled]="courseForm.invalid"
      [buttonText]="isEditMode ? 'Update Course' : 'Create Course'">
    </app-button>

    <app-button type="button" buttonText="Cancel" (click)="onCancel()">
    </app-button>
  </div>
</form>
