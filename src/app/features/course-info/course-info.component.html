<div class="title" *ngIf="course">{{ course.title }}</div>

<div class="course-info" *ngIf="course">
  <div class="course-info__description">
    <div><b>Description:</b></div>
    <p>{{ course.description }}</p>
  </div>

  <div class="course-info__info">
    <div><b>ID:</b> <span class="course-info__info-id">{{ course.id }}</span></div>
    <div>
      <b>Duration:</b>
      <span class="course-info__info-duration">{{ course.duration | duration }}</span>
    </div>
    <div>
      <b>Created:</b>
      <span class="course-info__info-date">
        {{ course.creationDate ? (course.creationDate | customDate) : 'Unknown' }}
      </span>

    </div>
    <div>
      <b>Authors:</b>
      <span class="course-info__info-authors">{{ authorNames.join(', ') }}</span>
    </div>
  </div>
</div>
