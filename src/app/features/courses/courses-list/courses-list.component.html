<div class="courses-list">
    <app-course-card *ngFor="let course of courses" [title]="course.title" [description]="course.description"
        [creationDate]="course.creationDate" [duration]="course.duration" [authors]="course.authors"
        [editable]="editable" (clickOnShow)="onShow(course.id)">
        <app-button iconName="edit" (click)="onEdit(course.id)"></app-button>
        <app-button iconName="trash" (click)="onDelete(course.id)"></app-button>
    </app-course-card>
</div>
